<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PrismAI</title>
    <style>
        :root { --bg: #0d1117; --chat-bg: #161b22; --accent: #58a6ff; --text: #c9d1d9; --code-bg: #000; --user-msg: #238636; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; flex-direction: column; height: 100vh; }
        header { padding: 15px 25px; border-bottom: 1px solid #30363d; background: var(--chat-bg); display: flex; justify-content: space-between; align-items: center; }
        .logo { font-weight: bold; color: var(--accent); letter-spacing: 1px; font-size: 1.2rem; }
        #chat-window { flex-grow: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .msg { max-width: 85%; padding: 12px 16px; border-radius: 12px; line-height: 1.5; font-size: 0.95rem; }
        .user { align-self: flex-end; background: var(--user-msg); color: white; border-bottom-right-radius: 2px; }
        .ai { align-self: flex-start; background: var(--chat-bg); border: 1px solid #30363d; border-bottom-left-radius: 2px; }
        pre { background: var(--code-bg); padding: 12px; border-radius: 6px; overflow-x: auto; border: 1px solid #30363d; font-family: monospace; font-size: 0.85rem; color: #e6edf3; }
        .input-area { padding: 20px; background: var(--chat-bg); border-top: 1px solid #30363d; display: flex; gap: 10px; }
        input { flex-grow: 1; background: #0d1117; border: 1px solid #30363d; color: white; padding: 12px; border-radius: 6px; outline: none; }
        button { background: var(--accent); border: none; padding: 12px 24px; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .loading { font-size: 0.8rem; color: var(--accent); display: none; margin-bottom: 5px; }
    </style>
</head>
<body>

<header>
    <div class="logo">PRISM AI</div>
</header>

<div id="chat-window">
    <div class="msg ai">PrismAI.</div>
</div>

<div class="input-area">
    <div style="flex-grow: 1;">
        <div id="status" class="loading">Saturating prompts... (3-step verification active)</div>
        <input type="text" id="userInput" placeholder="Ask or paste code..." autocomplete="off">
    </div>
    <button id="sendBtn">SEND</button>
</div>

<script>
    const CONFIG = {
        API_KEY: "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", // <--- INSERT KEY HERE
        MODEL: "meta-llama/llama-3.1-70b-instruct",
        // This Proxy fixes the CORS error you encountered
        ENDPOINT: "https://corsproxy.io"
    };

    async function callAI(prompt) {
        try {
            const resp = await fetch(CONFIG.ENDPOINT, {
                method: "POST",
                headers: { "Content-Type": "application/json", "Authorization": `Bearer ${CONFIG.API_KEY}` },
                body: JSON.stringify({ model: CONFIG.MODEL, messages: [{ role: "user", content: prompt }] })
            });
            const data = await resp.json();
            return data.choices[0].message.content;
        } catch (e) { return "Error contacting API. Check Key/CORS."; }
    }

    function append(text, role, isCode = false) {
        const d = document.createElement('div');
        d.className = `msg ${role}`;
        d.innerHTML = isCode ? `<pre>${text.replace(/</g, "&lt;")}</pre>` : text;
        document.getElementById('chat-window').appendChild(d);
        document.getElementById('chat-window').scrollTop = document.getElementById('chat-window').scrollHeight;
    }

    async function handle() {
        const input = document.getElementById('userInput');
        const val = input.value.trim();
        if(!val) return;

        append(val, 'user');
        input.value = '';
        
        // Detection for code/debug tasks
        const isCode = /code|fix|debug|function|{/i.test(val);
        document.getElementById('sendBtn').disabled = true;

        if (isCode) {
            document.getElementById('status').style.display = 'block';
            
            // 2 parallel prompts for "Smart" comparison
            const [a, b] = await Promise.all([
                callAI(`Provide a solution for: ${val}`),
                callAI(`Provide an optimized, secure alternative for: ${val}`)
            ]);

            // Final Surgical Synthesis
            const final = await callAI(`
                Compare these solutions for accuracy:
                A: ${a}
                B: ${b}
                Target Task: ${val}
                Output ONLY a surgical SEARCH/REPLACE block.
            `);

            document.getElementById('status').style.display = 'none';
            append(final, 'ai', true);
        } else {
            const r = await callAI(val);
            append(r, 'ai');
        }
        document.getElementById('sendBtn').disabled = false;
    }

    document.getElementById('sendBtn').addEventListener('click', handle);
    document.getElementById('userInput').addEventListener('keypress', (e) => { if(e.key === 'Enter') handle(); });
</script>
</body>
</html>
